<!DOCTYPE html>
<html>
<head>
    <meta http-equiv="refresh" content="0; url=./frontend/">
    <title>CitizenSheild</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            padding: 50px;
            background: #f5f5f5;
        }
        .loader {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #ff4444;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="loader"></div>
    <p>Redirecting to CitizenSheild...</p>
    <p>If not redirected, <a href="./frontend/">click here</a></p>
</body>
</html>
